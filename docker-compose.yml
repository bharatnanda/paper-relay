services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  frontend_tools:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    profiles: ["tools"]
    command: sh -lc "npm install --legacy-peer-deps --no-audit --no-fund && npm run build"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -lc "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/paperrelay
      LLM_PROVIDER: ${LLM_PROVIDER:-azure}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_BASE_URL: ${AZURE_OPENAI_BASE_URL:-}
      AZURE_OPENAI_MODEL: ${AZURE_OPENAI_MODEL:-gpt-4o-mini}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-dev-only-change-me}
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      FROM_EMAIL: noreply@paperrelay.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: sh -lc "uv run celery -A app.workers.celery_app worker --loglevel=info"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/paperrelay
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_BASE_URL: ${AZURE_OPENAI_BASE_URL:-}
      AZURE_OPENAI_MODEL: ${AZURE_OPENAI_MODEL:-}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-dev-only-change-me}
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      FROM_EMAIL: noreply@paperrelay.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      mailpit:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paperrelay
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paperrelay"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "8025:8025"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
